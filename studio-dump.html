<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Peer Vink — Studio Dump</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:wght@200;300;400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="dump-page">
  <div class="chain-layer" aria-hidden="true">
  <div class="scroll-chain chain-left"></div>
  <div class="scroll-chain chain-right"></div>
</div>
 <main class="dump-stage">
  <img class="dump-background-gif" src="assets/work-dump-bg.gif" alt="" aria-hidden="true">

  <a class="back-link" href="home.html">← back</a>

  <header class="dump-header">
    <h1>Studio Dump</h1>
  </header>

<section class="dump-grid" aria-label="Studio Dump images"></section>
</main>



<div class="custom-cursor"></div>

  <script src="studio-dump-data.js"></script>
<script src="studio-dump-render.js"></script>
<script src="script.js"></script>
<script>
  (function () {
    const layer = document.querySelector(".chain-layer");

    if (!layer) return;

    function moveChains() {
      const scrollY = window.scrollY || window.pageYOffset;

      document.documentElement.style.setProperty(
        "--chain-left-y",
        `${scrollY * -0.55}px`
      );

      document.documentElement.style.setProperty(
        "--chain-right-y",
        `${scrollY * 0.55}px`
      );
    }

    window.addEventListener("scroll", moveChains, { passive: true });
    window.addEventListener("resize", moveChains);

    moveChains();
  })();
</script>
</body>
</html>
