<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Peer Vink — Studio Dump</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:wght@200;300;400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="dump-page">
  <div class="chain-layer" aria-hidden="true">
  <div class="scroll-chain chain-left"></div>
  <div class="scroll-chain chain-right"></div>
</div>
 <main class="dump-stage">
  <img class="dump-background-gif" src="assets/work-dump-bg.gif" alt="" aria-hidden="true">

  <a class="back-link" href="home.html">← back</a>

  <header class="dump-header">
    <h1>Studio Dump</h1>
  </header>

<section class="dump-grid" aria-label="Studio Dump images"></section>
</main>
<div class="image-lightbox" aria-hidden="true">
  <button class="lightbox-close" type="button" aria-label="Sluit afbeelding">×</button>
  <img class="lightbox-image" src="" alt="">
</div>


<div class="custom-cursor"></div>

  <script src="studio-dump-data.js"></script>
<script src="studio-dump-render.js"></script>
<script src="script.js"></script>
<script>
  (function () {
    const grid = document.querySelector(".dump-grid");
    const lightbox = document.querySelector(".image-lightbox");
    const lightboxImage = document.querySelector(".lightbox-image");
    const closeButton = document.querySelector(".lightbox-close");

    if (!grid || !lightbox || !lightboxImage || !closeButton) return;

    function openLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt || "";

      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");

      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("is-open");
      lightbox.setAttribute("aria-hidden", "true");

      lightboxImage.src = "";
      lightboxImage.alt = "";

      document.body.style.overflow = "";
    }

    grid.addEventListener("click", function (event) {
      const link = event.target.closest("a");
      const image = event.target.closest("img");

      if (!link || !image || !grid.contains(link)) return;

      event.preventDefault();

      openLightbox(link.href || image.currentSrc || image.src, image.alt);
    });

    closeButton.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", function (event) {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    window.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
        closeLightbox();
      }
    });
  })();
</script>
<script>
  (function () {
    const layer = document.querySelector(".chain-layer");

    if (!layer) return;

    function moveChains() {
      const scrollY = window.scrollY || window.pageYOffset;

      document.documentElement.style.setProperty(
        "--chain-left-y",
        `${scrollY * -0.55}px`
      );

      document.documentElement.style.setProperty(
        "--chain-right-y",
        `${scrollY * 0.55}px`
      );
    }

    window.addEventListener("scroll", moveChains, { passive: true });
    window.addEventListener("resize", moveChains);

    moveChains();
  })();
</script>
</body>
</html>
