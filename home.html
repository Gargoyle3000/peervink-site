<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Peer Vink — Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:wght@200;300;400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    body.simple-home-page {
      margin: 0;
      min-height: 100vh;
      background: white;
      font-family: "Zalando Sans SemiExpanded", Helvetica, Arial, sans-serif;
      font-weight: 200;
    }

    .simple-home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .home-menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .home-menu a,
    .home-menu a:visited,
    .home-contact a,
    .home-contact a:visited {
      color: black;
      text-decoration: none;
      font-family: "Zalando Sans SemiExpanded", Helvetica, Arial, sans-serif;
      font-weight: 200;
    }

    .home-menu a {
      font-size: clamp(42px, 4.8vw, 72px);
      line-height: 0.95;
      text-align: center;
      transition: color 120ms ease;
    }

    .home-contact {
      margin-top: 100px;
      font-size: clamp(18px, 1.5vw, 24px);
      line-height: 1.2;
      text-align: center;
      font-family: "Zalando Sans SemiExpanded", Helvetica, Arial, sans-serif;
      font-weight: 200;
    }

    .home-contact span {
      margin-right: 6px;
    }

    .home-menu a:hover,
    .home-menu a:focus-visible,
    .home-contact a:hover,
    .home-contact a:focus-visible {
      color: #00D422;
    }

    @media (max-width: 700px) {
      body.simple-home-page {
        min-height: 100svh;
      }

      .simple-home {
        min-height: 100svh;
        padding: 24px 18px;
      }

      .home-menu {
        gap: 8px;
      }

      .home-menu a {
        display: block;
        font-size: 46px;
        line-height: 0.94;
      }

      .home-contact {
        margin-top: 62px;
        font-size: 18px;
      }

      .home-contact span,
      .home-contact a {
        display: block;
      }

      .home-contact span {
        margin-right: 0;
        margin-bottom: 7px;
      }
    }

    @media (max-width: 380px) {
      .home-menu a {
        font-size: 41px;
      }

      .home-contact {
        font-size: 16px;
      }
    }
  </style>
</head>

<body class="simple-home-page">
  <main class="simple-home">
    <nav class="home-menu" aria-label="Main navigation">
      <a href="recent-works.html">Recent Works</a>
      <a href="work-dump.html">Work Dump</a>
      <a href="cv.html">CV</a>
    </nav>

    <div class="home-contact">
      <span>contact :</span>
      <a href="mailto:Peervink@gmail.com">Peervink@gmail.com</a>
    </div>
  </main>

  <div class="custom-cursor"></div>
  <script src="script.js"></script>
</body>
</html>
